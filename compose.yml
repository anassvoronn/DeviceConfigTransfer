services:
  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: TaskWithJSONFile
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - my_shared_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - my_shared_network

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      KAFKA_REPLICA_FETCH_MAX_BYTES: 1048576
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - my_shared_network

  producer:
    build:
      context: .
      dockerfile: /device-config-producer/Dockerfile
    volumes:
      - ./input:/input
    container_name: device-config-producer
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_DEVICE_CONFIG_TOPIC: device-config-topic
      KAFKA_MAX_MESSAGE_SIZE: 1048576
      KAFKA_BUFFER_MEMORY: 33554432
      CHUNK_SIZE: 770000
    depends_on:
      - kafka
    networks:
      - my_shared_network

  consumer:
    build:
      context: .
      dockerfile: /device-config-consumer/Dockerfile
    volumes:
      - ./output:/output
    container_name: device-config-consumer
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CHUNK_SIZE: 770000
    depends_on:
      - kafka
    networks:
      - my_shared_network

  parser:
    build:
      context: .
      dockerfile: /device-config-parser/Dockerfile
    volumes:
      - ./output:/output
    container_name: device-config-parser
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/TaskWithJSONFile
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - postgres
    networks:
      - my_shared_network

volumes:
  kafka_data:
networks:
  my_shared_network:
    name: my_shared_network